{% extends "base.html" %}
{% block content %}
    <h1>Ana Feed</h1>
    {% for post in posts %}
        <div class="post">
            {% if post.is_video %}
                <video controls>
                    <source src="{{ url_for('static', filename='uploads/' + post.file) }}" type="video/mp4">
                </video>
            {% else %}
                <img src="{{ url_for('static', filename='uploads/' + post.file) }}" alt="post">
            {% endif %}
            <p>❤️ {{ post.likes }} Beğeni</p>
            <p>{{ post.content }}</p>
        </div>
    {% endfor %}
{% endblock %}
